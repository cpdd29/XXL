services:
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    environment:
      WORKBOT_METRICS_SCRAPE_TOKEN: ${WORKBOT_METRICS_SCRAPE_TOKEN:-}
    command:
      [
        "sh",
        "-c",
        "sed \"s|__WORKBOT_METRICS_SCRAPE_TOKEN__|$${WORKBOT_METRICS_SCRAPE_TOKEN}|g\" /etc/prometheus/prometheus.yml.tpl > /etc/prometheus/prometheus.yml && exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.enable-lifecycle",
      ]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml.tpl:/etc/prometheus/prometheus.yml.tpl:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${WORKBOT_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${WORKBOT_GRAFANA_ADMIN_PASSWORD:-workbot-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  prometheus_data:
  grafana_data:
